source = ~/.config/hypr/hyprlock-colors.conf

general {
    hide_cursor = false
    grace = 0
}

background {
    monitor =
    path = screenshot

    blur_passes = 3
    blur_size = 8

    noise = 0.0117
    contrast = 1.1
    brightness = 0.8

    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

# === DATE ===
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = $accent2
    font_size = 24
    font_family = JetBrainsMono Nerd Font

    position = 0, -75 # + 1 on each vector
    halign = center
    valign = top
}

# === CLOCK (Big) ===
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $accent2
    font_size = 80
    font_family = JetBrainsMono Nerd Font

    position = 0, -100
    halign = center
    valign = top
}

# === AVATAR ===
image {
    monitor =
    path = ~/.face/avatar.jpg

    size = 220
    rounding = -1

    border_size = 2
    border_color = $accent2

    position = 0, -250
    halign = center
    valign = top
}

# === USER PILL ===
label {
    monitor =
    text = $USER

    color = $accent2
    font_size = 32
    font_family = JetBrainsMono Nerd Font

    position = 0, -500
    halign = center
    valign = top

    background_color = rgba(28,25,32,0.72)
    padding = 12
    rounding = 999
}

# === PASSWORD FIELD ===
input-field {
    monitor =

    size = 320, 56
    outline_thickness = 2

    outer_color = $accent2
    inner_color = rgba(28,25,32,0.72)
    font_color = $accent2

    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true

    rounding = 999

    placeholder_text = <span foreground="##ffffff88">🔒 Enter Password</span>

    hide_input = false
    fade_on_empty = false

    check_color = $accent2
    fail_color = $urgent

    capslock_color = $accent
    numlock_color = $accent

    position = 0, 150
    halign = center
    valign = bottom
}

animations {
    enabled = true
}

# === PASSWORD FIELD ===
bezier = lockEase, 0.22, 1, 0.36, 1

animation = fadeIn, 1, 4, lockEase
animation = fadeOut, 1, 5, lockEase
animation = inputFieldDots, 1, 4, lockEase
animation = inputFieldColors, 1, 5, lockEase
