source = ~/.config/hypr/hyprlock-colors.conf

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.1000
    brightness = 0.8000
    vibrancy = 0.1500
    vibrancy_darkness = 0.0000
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = $accent
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A %d %B %Y")"
    color = $fg
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 130
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1
    outer_color = $accent
    inner_color = rgba(28,25,32,0.72)
    font_color = $accent
    fade_on_empty = false
    placeholder_text = <span foreground="##f5e0dc99">Password...</span>
    hide_input = false
    rounding = 999
    check_color = $accent
    fail_color = $urgent
    fail_text = <span foreground="##{{color1}}">Authentication failed</span>
    capslock_color = $accent2
    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $fg
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 95
    halign = center
    valign = center
}
